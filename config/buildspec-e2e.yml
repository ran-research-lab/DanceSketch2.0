version: 0.2

env:
  parameter-store:
    ES_VERSION_LIST: /earsketch-webclient/version_number
  secrets-manager:
    GITHUB_USER: Github_EarSketch_CICD_Credentials:github_user
    GITHUB_TOKEN: Github_EarSketch_CICD_Credentials:github_token
  shell: bash

phases:
  install:
    commands:
      - npm ci
  pre_build:
    commands:
      - export ES_SCRIPT_HOME="$CODEBUILD_SRC_DIR/config/deployment-scripts"
      - export LOCAL_STAGING_DIR_NAME="${CODEBUILD_SOURCE_VERSION//\//-}"
  build:
    commands:
      - nohup npm run dev & echo $! > pidfile
      - npx wait-on --timeout 120000 http://localhost:8888
      - npm run test:e2e
      - kill $(cat pidfile)
  post_build:
    commands:
      - if [ "$CODEBUILD_BUILD_SUCCEEDING" == "0" ]; then python3 "$ES_SCRIPT_HOME/github_add_pr_comment.py" "$CODEBUILD_BUILD_NUMBER" "$LOCAL_STAGING_DIR_NAME" "$CODEBUILD_RESOLVED_SOURCE_VERSION"; fi

reports:
  playwright-reports:
    files:
      - "tests/playwright/reports/*.xml"
    file-format: "JUNITXML"

artifacts:
  base-directory: playwright-report
  files:
    - "**/*"
  name: playwright-report-build-$CODEBUILD_BUILD_NUMBER
